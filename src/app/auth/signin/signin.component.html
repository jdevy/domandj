<mat-card>
    <mat-card-title>PLEASE SIGN IN</mat-card-title>
    <mat-card-content>
      <form [formGroup]="signInForm" (ngSubmit)="onSubmit()">
        <p>
          <mat-form-field fxFlex>
            <input type="text" formControlName="email" matInput placeholder="E-mail">
          </mat-form-field>
        </p>
        <p>
          <mat-form-field fxFlex>
            <input type="password" formControlName="password" matInput placeholder="Password">
          </mat-form-field>
        </p>
        <p *ngIf="errorMessage">
          {{ errorMessage }}
        </p>
        <p class="loginButtons">
          <button type="submit" mat-button md-raised-button fxFlex [disabled]="!signInForm.valid || signInForm.pending">Login</button>
        </p>
      </form>
    </mat-card-content>
  </mat-card>
