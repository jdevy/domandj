<mat-toolbar>
  <span>{{service.form.controls['$key'].value?"Modify student":"New student"}}</span>
  <span class="fill-remaining-space"></span>
  <button class="btn-dialog-close" mat-stroked-button (click)="onClose()" tabindex="-1"><mat-icon>clear</mat-icon></button>
</mat-toolbar>
<form [formGroup]="this.service.form" class="normal-form" (ngSubmit)="onSubmit()">
  <mat-grid-list cols="1" rowHeight="500px">
    <mat-grid-tile>
      <div class="controles-container">
        <input type="hidden" formControlName="$key">
        <mat-form-field>
          <input formControlName="lastName" matInput placeholder="Nom*">
          <mat-error>Ce champ est obligatoire !</mat-error>
        </mat-form-field>
          <mat-form-field>
          <input formControlName="firstName" matInput placeholder="Prénom">
        </mat-form-field>
        <mat-form-field>
          <input formControlName="mobile" matInput placeholder="Mobile">
          <mat-error>Minimum 8 caractères !</mat-error>
        </mat-form-field>
        <mat-form-field>
          <input formControlName="email" matInput placeholder="Email">
          <mat-error>Adresse mail non valide !</mat-error>
        </mat-form-field>
        <div class="button-row">
          <button mat-raised-button color="primary" type="submit" [disabled]="service.form.invalid">Submit</button>
          <button mat-raised-button color="warn" (click)="onClose()">Cancel</button>
        </div>
      </div>
    </mat-grid-tile>
  </mat-grid-list>
</form>
<div *ngIf="showSuccessMessage">
  Submitted successfully.
</div>
