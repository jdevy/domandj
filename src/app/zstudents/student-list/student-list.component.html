<div>
  <mat-toolbar>
    <span class="fill-remaining-space"></span>
    <span>Elèves du groupe</span>
    <span class="fill-remaining-space"></span>
    <button mat-mini-fab (click)="onSubmit()" class="fab-bottom-right">
      <mat-icon>add</mat-icon>
    </button>
  </mat-toolbar>
  <div *ngFor="let student of students">
    <td>{{ student.name }}</td>
    <td>
      <button mat-icon-button color="warn" (click)="onDelete(student.id)">
        <mat-icon>delete_outline</mat-icon>
      </button>
    </td>
  </div>

  <form [formGroup]="this.service.form" class="normal-form" (ngSubmit)="onSubmit()">
    <mat-grid-list cols="1" rowHeight="100px">
      <mat-grid-tile>
        <div>
          <input type="hidden" formControlName="id">
          <mat-form-field>
            <input formControlName="name" matInput placeholder="Nom*">
            <mat-error>Ce champ est obligatoire !</mat-error>
          </mat-form-field>
          <div class="button-row">
            <button mat-raised-button color="primary" type="submit" [disabled]="service.form.invalid">Submit</button>
            <button mat-raised-button color="warn" (click)="onClose()">Cancel</button>
          </div>
        </div>
      </mat-grid-tile>
    </mat-grid-list>
  </form>
</div>
